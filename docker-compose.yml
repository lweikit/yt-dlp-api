services:
  yt-dlp-api:
    build: .
    container_name: yt-dlp-api
    ports:
      - "30191:8191"
    environment:
      - SONARR_URL=http://192.168.216.10:30113
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=${RADARR_URL:-http://192.168.216.10:30878}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - ARR_TAG=${ARR_TAG:-tvb}
      - DOWNLOAD_DIR=/downloads/yt-dlp
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-2}
      - JOB_RETENTION=${JOB_RETENTION:-86400}
    volumes:
      # Container paths must match what Sonarr/Radarr report as series/movie paths.
      - /mnt/nexus/media/tv:/tv
      - /mnt/nexus/media/movies:/movies
      - /mnt/nexus/downloads:/downloads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8191/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
